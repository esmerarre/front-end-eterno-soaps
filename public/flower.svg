<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" aria-labelledby="title">
  <title>Flower</title>
  <defs>
    <style>
      .p{fill:#D99CA8;stroke:#000;stroke-width:0.8;stroke-linejoin:round;stroke-linecap:round}
      .c{fill:#F6E0E6;stroke:#000;stroke-width:0.8;stroke-linejoin:round;stroke-linecap:round}
    </style>
  </defs>
  <!-- petals -->
  <g transform="translate(32,32)">
    <ellipse class="p" rx="8" ry="18" transform="rotate(0) translate(0,-18)" />
    <ellipse class="p" rx="8" ry="18" transform="rotate(60) translate(0,-18)" />
    <ellipse class="p" rx="8" ry="18" transform="rotate(120) translate(0,-18)" />
    <ellipse class="p" rx="8" ry="18" transform="rotate(180) translate(0,-18)" />
    <ellipse class="p" rx="8" ry="18" transform="rotate(240) translate(0,-18)" />
    <ellipse class="p" rx="8" ry="18" transform="rotate(300) translate(0,-18)" />
    <!-- center -->
    <circle class="c" r="8" />
  </g>
</svg>
